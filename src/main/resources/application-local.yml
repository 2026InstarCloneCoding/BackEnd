spring:
  datasource:
    url: jdbc:mysql://localhost:3307/instagram?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: instagram
    password: instagram
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:test@gmail.com}
    password: ${GMAIL_PASSWORD:test}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
